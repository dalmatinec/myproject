<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeToo — Каталог анкет</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo" id="site-logo">WeToo</a>
            <nav class="nav">
                <a href="add-profile.html" class="btn btn-primary">Разместить анкету</a>
                <a href="admin.html" class="btn btn-secondary" id="admin-link">Админ-панель</a>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <section class="vip-section" id="vip-section" style="display: none;">
            <h2 class="section-title">VIP Анкеты</h2>
            <div class="carousel-container">
                <button class="carousel-btn prev-btn" id="vip-prev">&#10094;</button>
                <div class="carousel-track-wrapper">
                    <div class="carousel-track" id="vip-carousel-track">
                        </div>
                </div>
                <button class="carousel-btn next-btn" id="vip-next">&#10095;</button>
            </div>
        </section>

        <section class="filter-section">
            <div class="filter-wrapper">
                <label for="city-filter" class="filter-label">Выберите город:</label>
                <select id="city-filter" class="form-select">
                    <option value="">Все города</option>
                    </select>
            </div>
        </section>

        <section class="catalog-section">
            <h2 class="section-title" id="catalog-title">Все анкеты</h2>
            
            <div class="catalog-grid" id="catalog-grid">
                </div>

            <div class="empty-state" id="empty-state" style="display: none;">
                <div class="empty-state-icon">🔍</div>
                <h3 class="empty-state-title" id="empty-title">Никого не найдено</h3>
                <p class="empty-state-text" id="empty-text">Попробуйте выбрать другой город или зайдите позже.</p>
                <button class="btn btn-secondary" id="reset-filter-btn">Сбросить фильтр</button>
            </div>
        </section>

        <section class="news-section" id="news-section" style="display: none;">
            <h2 class="section-title">Новости проекта</h2>
            <div class="news-grid" id="news-grid">
                </div>
        </section>

    </main>

    <footer class="footer">
        <div class="container footer-container">
            <p>&copy; 2026 WeToo. Все права защищены.</p>
            <div id="footer-contacts">
                </div>
        </div>
    </footer>

    <script src="api.js"></script>
    <script src="app.js"></script>
</body>
</html>
