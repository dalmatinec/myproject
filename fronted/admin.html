<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeToo — Панель администратора</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo">WeToo <span class="badge-admin">Admin</span></a>
            <nav class="nav">
                <a href="index.html" class="btn btn-secondary">На сайт</a>
                <button id="logout-btn" class="btn btn-danger" style="display: none;">Выйти</button>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <section class="admin-login-section" id="login-block">
            <div class="login-card">
                <h2>Вход в панель управления</h2>
                <form id="admin-login-form">
                    <div class="form-group">
                        <label for="login-username">Логин</label>
                        <input type="text" id="login-username" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Пароль</label>
                        <input type="password" id="login-password" class="form-input" required>
                    </div>
                    <div id="login-error" class="error-message" style="display: none;"></div>
                    <button type="submit" class="btn btn-primary btn-block">Войти</button>
                </form>
            </div>
        </section>

        <section class="admin-panel-section" id="admin-main-block" style="display: none;">
            
            <div class="admin-tabs">
                <button class="tab-btn active" data-tab="tab-profiles">Модерация анкет</button>
                <button class="tab-btn" data-tab="tab-settings">Настройки сайта</button>
            </div>

            <div class="tab-content active" id="tab-profiles">
                <div class="table-actions">
                    <h3>Анкеты, ожидающие проверки</h3>
                </div>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Фото</th>
                                <th>Имя, Возраст</th>
                                <th>Город</th>
                                <th>Контакты</th>
                                <th>Статус / Тариф</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="admin-profiles-table">
                            </tbody>
                    </table>
                </div>
                <div id="admin-empty-table" class="empty-state-table" style="display: none;">
                    Новых анкет на модерацию нет.
                </div>
            </div>

            <div class="tab-content" id="tab-settings">
                <h3>Глобальные настройки системы</h3>
                <form id="admin-settings-form" class="main-form">
                    
                    <div class="form-group">
                        <label for="settings-title">Название проекта / Логотип</label>
                        <input type="text" id="settings-title" class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="settings-tg-link">Ссылка на Telegram-канал новостей</label>
                        <input type="url" id="settings-tg-link" class="form-input" placeholder="https://t.me/...">
                    </div>

                    <div class="form-group">
                        <label for="settings-contacts">Контакты в подвале (HTML / Текст)</label>
                        <textarea id="settings-contacts" class="form-textarea" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="settings-bot-token">Telegram Bot Token (для интеграции)</label>
                        <input type="password" id="settings-bot-token" class="form-input">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                    </div>
                </form>
            </div>

        </section>
    </main>

    <script src="api.js"></script>
    <script src="admin.js"></script>
</body>
</html>
