<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Анкеты — WeToo</title>
    <meta name="description" content="Просмотр анкет проверенных специалистов" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <a href="index.html">WeToo</a>
            </div>
            <button class="burger" id="burgerBtn" aria-label="Меню">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav" id="mainNav">
                <ul>
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="profiles.html" class="active">Анкеты</a></li>
                    <li><a href="news.html">Новости</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                    <li><a href="about.html">О нас</a></li>
                </ul>
                <a href="add-profile.html" class="btn btn-primary btn-sm">➕ Подать анкету</a>
            </nav>
        </div>
    </header>

    <!-- ===== ФИЛЬТРЫ ===== -->
    <section class="filters-section">
        <div class="container">
            <h1 class="page-title">Анкеты</h1>
            <div class="filters">
                <div class="filter-group">
                    <label>Город</label>
                    <select id="filterCity" data-cities data-placeholder="Все города">
                        <option value="">Все города</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Возраст</label>
                    <div class="filter-age">
                        <input type="number" id="filterAgeFrom" placeholder="от" min="18" max="120" />
                        <span>—</span>
                        <input type="number" id="filterAgeTo" placeholder="до" min="18" max="120" />
                    </div>
                </div>
                <div class="filter-group">
                    <label>VIP</label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="filterVip" />
                        <span>⭐ Только VIP</span>
                    </label>
                </div>
                <div class="filter-group">
                    <label>Сортировка</label>
                    <select id="filterSort">
                        <option value="new">Новые</option>
                        <option value="vip">VIP</option>
                        <option value="top">ТОП</option>
                    </select>
                </div>
                <div class="filter-group filter-search">
                    <label>Поиск</label>
                    <input type="text" id="filterSearch" placeholder="Поиск по имени..." />
                </div>
                <button class="btn btn-primary" id="filterApply">🔍 Применить</button>
                <button class="btn btn-secondary" id="filterReset">✕ Сбросить</button>
            </div>
        </div>
    </section>

    <!-- ===== СПИСОК АНКЕТ ===== -->
    <section class="profiles-section">
        <div class="container">
            <div class="profiles-grid" id="profilesGrid">
                <!-- Загружается через JS -->
            </div>
            <div class="profiles-empty" id="profilesEmpty" style="display:none;">
                <div class="empty-icon">🔍</div>
                <h3>Анкеты не найдены</h3>
                <p>Попробуйте изменить параметры поиска</p>
                <button class="btn btn-secondary" id="emptyReset">Сбросить фильтры</button>
            </div>
            <div class="pagination" id="pagination">
                <!-- Загружается через JS -->
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-brand">
                <div class="logo">WeToo</div>
                <p>Платформа проверенных анкет</p>
            </div>
            <div class="footer-links">
                <a href="index.html">Главная</a>
                <a href="profiles.html">Анкеты</a>
                <a href="news.html">Новости</a>
                <a href="contacts.html">Контакты</a>
                <a href="about.html">О нас</a>
            </div>
            <div class="footer-copy">
                © 2026 WeToo. Все права защищены.
            </div>
        </div>
    </footer>

    <!-- ===== МОДАЛЬНОЕ ОКНО АНКЕТЫ ===== -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <button class="modal-close" id="profileModalClose">✕</button>
            <div class="modal-body" id="modalBody">
                <!-- Загружается через JS -->
            </div>
        </div>
    </div>

    <script src="assets.js"></script>
    <script>
        (function() {
            'use strict';

            // ===== СОСТОЯНИЕ =====
            const state = {
                page: 1,
                limit: 12,
                total: 0,
                filters: {
                    city_id: '',
                    age_from: '',
                    age_to: '',
                    vip: 0,
                    sort: 'new',
                    search: ''
                }
            };

            // ===== DOM ЭЛЕМЕНТЫ =====
            const grid = document.getElementById('profilesGrid');
            const empty = document.getElementById('profilesEmpty');
            const pagination = document.getElementById('pagination');

            const filterCity = document.getElementById('filterCity');
            const filterAgeFrom = document.getElementById('filterAgeFrom');
            const filterAgeTo = document.getElementById('filterAgeTo');
            const filterVip = document.getElementById('filterVip');
            const filterSort = document.getElementById('filterSort');
            const filterSearch = document.getElementById('filterSearch');
            const filterApply = document.getElementById('filterApply');
            const filterReset = document.getElementById('filterReset');
            const emptyReset = document.getElementById('emptyReset');

            // ===== ПАРСИМ URL ПАРАМЕТРЫ =====
            function parseUrlParams() {
                const params = new URLSearchParams(window.location.search);
                const city = params.get('city');
                if (city) {
                    state.filters.city_id = city;
                    filterCity.value = city;
                }
            }

            // ===== ЗАГРУЗКА АНКЕТ =====
            async function loadProfiles() {
                const params = new URLSearchParams();
                params.set('page', state.page);
                params.set('limit', state.limit);

                for (const [key, value] of Object.entries(state.filters)) {
                    if (value) {
                        params.set(key, value);
                    }
                }

                try {
                    const response = await fetch('/api/profiles/?' + params.toString());
                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error || 'Ошибка загрузки');
                    }

                    state.total = data.pagination?.total || 0;
                    renderProfiles(data.data || []);
                    renderPagination(data.pagination);

                } catch (error) {
                    console.error('Ошибка загрузки анкет:', error);
                    grid.innerHTML = `
                        <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#e74c3c;">
                            <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                            <h3>Ошибка загрузки</h3>
                            <p style="color:#666;">${error.message}</p>
                            <button class="btn btn-secondary" style="margin-top:16px;" onclick="location.reload()">Обновить</button>
                        </div>
                    `;
                    pagination.innerHTML = '';
                }
            }

            // ===== ОТРИСОВКА АНКЕТ =====
            function renderProfiles(profiles) {
                if (!profiles || profiles.length === 0) {
                    grid.innerHTML = '';
                    empty.style.display = 'block';
                    return;
                }
                empty.style.display = 'none';

                grid.innerHTML = profiles.map(profile => {
                    const photo = profile.photo_urls && profile.photo_urls.length > 0
                        ? '/images/' + profile.photo_urls[0]
                        : '/images/default-avatar.png';

                    const isVip = profile.plan_name && ['VIP', 'ТОП'].includes(profile.plan_name);
                    const expiresAt = profile.expires_at && new Date(profile.expires_at) > new Date();

                    return `
                        <div class="profile-card" data-id="${profile.id}">
                            <div class="profile-card-img-wrap">
                                <img src="${photo}" alt="${profile.name}" class="profile-card-img" loading="lazy" />
                                ${isVip && expiresAt ? '<span class="profile-card-badge">⭐ VIP</span>' : ''}
                            </div>
                            <div class="profile-card-body">
                                <h3 class="profile-card-name">${profile.name}, ${profile.age}</h3>
                                <p class="profile-card-city">${profile.city_name || 'Город не указан'}</p>
                                <p class="profile-card-desc">${profile.description ? profile.description.substring(0, 100) + '...' : ''}</p>
                                ${profile.price ? `<p class="profile-card-price">от ${profile.price} ₽</p>` : ''}
                                <button class="btn btn-primary btn-sm" onclick="openProfileModal(${profile.id})">Подробнее</button>
                            </div>
                        </div>
                    `;
                }).join('');

                // Клик по карточке = открыть модалку
                grid.querySelectorAll('.profile-card').forEach(card => {
                    card.addEventListener('click', function(e) {
                        if (e.target.tagName === 'BUTTON') return;
                        const id = parseInt(this.dataset.id);
                        if (id) openProfileModal(id);
                    });
                });
            }

            // ===== ПАГИНАЦИЯ =====
            function renderPagination(paginationData) {
                if (!paginationData || paginationData.pages <= 1) {
                    pagination.innerHTML = '';
                    return;
                }

                const current = paginationData.page;
                const total = paginationData.pages;

                let html = '';
                html += `<button class="page-btn" data-page="${current - 1}" ${current <= 1 ? 'disabled' : ''}>‹</button>`;

                for (let i = 1; i <= total; i++) {
                    if (i === current) {
                        html += `<button class="page-btn active" data-page="${i}">${i}</button>`;
                    } else if (i <= 3 || i > total - 3 || Math.abs(i - current) <= 1) {
                        html += `<button class="page-btn" data-page="${i}">${i}</button>`;
                    } else if (i === 4 || i === total - 3) {
                        html += `<span class="page-dots">…</span>`;
                    }
                }

                html += `<button class="page-btn" data-page="${current + 1}" ${current >= total ? 'disabled' : ''}>›</button>`;

                pagination.innerHTML = html;

                pagination.querySelectorAll('.page-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const page = parseInt(this.dataset.page);
                        if (!isNaN(page) && page >= 1 && page <= total) {
                            state.page = page;
                            loadProfiles();
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });
                });
            }

            // ===== МОДАЛЬНОЕ ОКНО АНКЕТЫ =====
            window.openProfileModal = async function(id) {
                const modal = document.getElementById('profileModal');
                const body = document.getElementById('modalBody');
                body.innerHTML = '<p style="text-align:center;padding:40px;">Загрузка...</p>';
                modal.classList.add('open');
                document.body.style.overflow = 'hidden';

                try {
                    const response = await fetch('/api/profiles/' + id);
                    const profile = await response.json();

                    if (!response.ok) {
                        throw new Error(profile.error || 'Анкета не найдена');
                    }

                    const photos = profile.photo_urls && profile.photo_urls.length > 0
                        ? profile.photo_urls.map(url => `<img src="/images/${url}" alt="Фото" />`).join('')
                        : '<p style="color:#999;">Нет фото</p>';

                    const isVip = profile.plan_name && ['VIP', 'ТОП'].includes(profile.plan_name);

                    body.innerHTML = `
                        <div class="modal-profile">
                            <div class="modal-photos">${photos}</div>
                            <h2>${profile.name}, ${profile.age}</h2>
                            ${isVip ? '<span style="display:inline-block;background:#FFF8E1;color:#F1C40F;padding:2px 12px;border-radius:20px;font-size:13px;font-weight:600;margin-bottom:8px;">⭐ VIP</span>' : ''}
                            <p><strong>Город:</strong> ${profile.city_name || 'Не указан'}</p>
                            <p><strong>Описание:</strong></p>
                            <p style="color:#444;background:#f8f9fc;padding:12px;border-radius:8px;margin-bottom:12px;">${profile.description || 'Нет описания'}</p>
                            ${profile.price ? `<p><strong>Цена:</strong> от ${profile.price} ₽</p>` : ''}
                            ${profile.telegram ? `<p><strong>Telegram:</strong> <a href="https://t.me/${profile.telegram.replace('@', '')}" target="_blank" style="color:#6C63FF;">${profile.telegram}</a></p>` : ''}
                            ${profile.whatsapp ? `<p><strong>WhatsApp:</strong> <a href="https://wa.me/${profile.whatsapp.replace(/[^0-9+]/g, '')}" target="_blank" style="color:#6C63FF;">${profile.whatsapp}</a></p>` : ''}
                            ${profile.telegram ? `<a href="https://t.me/${profile.telegram.replace('@', '')}" target="_blank" class="btn btn-primary" style="margin-top:12px;">💬 Связаться</a>` : ''}
                        </div>
                    `;

                } catch (error) {
                    body.innerHTML = `
                        <div style="text-align:center;padding:40px;color:#e74c3c;">
                            <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
                            <p>${error.message || 'Ошибка загрузки анкеты'}</p>
                            <button class="btn btn-secondary" style="margin-top:12px;" onclick="closeProfileModal()">Закрыть</button>
                        </div>
                    `;
                }
            };

            window.closeProfileModal = function() {
                const modal = document.getElementById('profileModal');
                modal.classList.remove('open');
                document.body.style.overflow = '';
            };

            // Инициализация модалки
            document.getElementById('profileModalClose').addEventListener('click', window.closeProfileModal);
            document.getElementById('profileModal').addEventListener('click', function(e) {
                if (e.target === this) window.closeProfileModal();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('profileModal');
                    if (modal.classList.contains('open')) window.closeProfileModal();
                }
            });

            // ===== ФИЛЬТРЫ =====
            function applyFilters() {
                state.filters.city_id = filterCity.value || '';
                state.filters.age_from = filterAgeFrom.value || '';
                state.filters.age_to = filterAgeTo.value || '';
                state.filters.vip = filterVip.checked ? 1 : 0;
                state.filters.sort = filterSort.value || 'new';
                state.filters.search = filterSearch.value || '';
                state.page = 1;
                loadProfiles();

                // Обновляем URL
                const params = new URLSearchParams();
                for (const [key, value] of Object.entries(state.filters)) {
                    if (value) params.set(key, value);
                }
                const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
                window.history.replaceState({}, '', newUrl);
            }

            function resetFilters() {
                filterCity.value = '';
                filterAgeFrom.value = '';
                filterAgeTo.value = '';
                filterVip.checked = false;
                filterSort.value = 'new';
                filterSearch.value = '';
                applyFilters();
            }

            filterApply.addEventListener('click', applyFilters);
            filterReset.addEventListener('click', resetFilters);
            emptyReset.addEventListener('click', resetFilters);

            // Enter в поле поиска
            filterSearch.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') applyFilters();
            });

            // ===== ИНИЦИАЛИЗАЦИЯ =====
            document.addEventListener('DOMContentLoaded', function() {
                parseUrlParams();
                // Если есть city в URL, применяем
                if (state.filters.city_id) {
                    filterCity.value = state.filters.city_id;
                }
                loadProfiles();
                initBurger();
            });

        })();
    </script>

</body>
</html>
