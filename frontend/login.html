<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему - PrivatClub</title>
    <meta name="description" content="Вход в панель управления PrivatClub для администраторов.">
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
</head>
<body class="login-page">
    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main id="main-content" role="main">
        <!-- БЛОК АВТОРИЗАЦИИ -->
        <section id="login-section" class="login-section">
            <div class="login-container">
                <div class="login-card">
                    <div class="login-logo">
                        <svg width="56" height="56" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <rect x="4" y="4" width="32" height="32" rx="8" stroke="#6C63FF" stroke-width="2"/>
                            <path d="M20 10L22.5 17.5L30 18L24 23L25.5 30.5L20 26.5L14.5 30.5L16 23L10 18L17.5 17.5L20 10Z" fill="#6C63FF"/>
                        </svg>
                        <span>PrivatClub</span>
                    </div>

                    <h1 class="login-title" data-translate="login_title">Вход в систему</h1>
                    <p class="login-subtitle" data-translate="login_subtitle">Панель управления PrivatClub</p>

                    <form id="login-form" novalidate>
                        <div class="login-form-group">
                            <label for="login-username" class="login-label" data-translate="login_user_label">Логин</label>
                            <input type="text" id="login-username" name="username" class="login-input" required data-translate-placeholder="login_user_placeholder">
                        </div>

                        <div class="login-form-group">
                            <label for="login-password" class="login-label" data-translate="login_pass_label">Пароль</label>
                            <input type="password" id="login-password" name="password" class="login-input" required data-translate-placeholder="login_pass_placeholder">
                        </div>

                        <div id="login-error" class="login-error" style="display: none;" data-translate="login_error_text">Неверный логин или пароль</div>

                        <button type="submit" class="btn btn-primary login-btn" id="btn-login" data-translate="login_btn">Войти</button>
                    </form>

                    <div class="login-footer">
                        <a href="/frontend/index.html" class="login-back-link" data-translate="login_back_link">Вернуться на сайт</a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="/frontend/app.js"></script>
</body>
</html>
