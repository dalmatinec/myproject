<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления - PrivatClub</title>
    <meta name="description" content="Панель управления PrivatClub для администраторов.">
    <link rel="stylesheet" href="/frontend/style.css">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
</head>
<body class="admin-page">
    <!-- ШАПКА АДМИНКИ -->
    <header class="admin-header">
        <div class="admin-header-container">
            <div class="admin-header-left">
                <div class="admin-logo">
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="4" y="4" width="32" height="32" rx="8" stroke="#6C63FF" stroke-width="2"/>
                        <path d="M20 10L22.5 17.5L30 18L24 23L25.5 30.5L20 26.5L14.5 30.5L16 23L10 18L17.5 17.5L20 10Z" fill="#6C63FF"/>
                    </svg>
                    <span>PrivatClub</span>
                </div>
                <span class="admin-header-title" data-translate="admin_panel_title">Панель управления</span>
            </div>
            <div class="admin-header-right">
                <button id="admin-logout" class="btn-logout" data-translate="admin_logout">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M13 4L18 10L13 16"/>
                        <line x1="18" y1="10" x2="7" y2="10"/>
                        <path d="M7 4V2H5C3.89543 2 3 2.89543 3 4V16C3 17.1046 3.89543 18 5 18H7V16"/>
                    </svg>
                    Выйти
                </button>
            </div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ АДМИНКИ -->
    <div class="admin-body">
        <!-- БОКОВОЕ МЕНЮ -->
        <aside class="admin-sidebar" role="navigation" aria-label="Административная навигация">
            <nav class="admin-nav">
                <ul class="admin-nav-list">
                    <li>
                        <button class="admin-nav-btn active" data-tab="moderation" data-translate="adm_tab_mod">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="10" cy="8" r="4"/>
                                <path d="M2 16C4 13 16 13 18 16"/>
                                <rect x="2" y="2" width="4" height="4" rx="1"/>
                                <rect x="14" y="2" width="4" height="4" rx="1"/>
                            </svg>
                            Модерация
                        </button>
                    </li>
                    <li>
                        <button class="admin-nav-btn" data-tab="cities" data-translate="adm_tab_cities">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="4" width="16" height="14" rx="1"/>
                                <rect x="5" y="7" width="4" height="4" rx="1"/>
                                <rect x="11" y="7" width="4" height="4" rx="1"/>
                            </svg>
                            Города
                        </button>
                    </li>
                    <li>
                        <button class="admin-nav-btn" data-tab="tariffs" data-translate="adm_tab_tariffs">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="10" cy="10" r="8"/>
                                <path d="M10 4V10L13 13"/>
                            </svg>
                            Тарифы
                        </button>
                    </li>
                    <li>
                        <button class="admin-nav-btn" data-tab="wallets" data-translate="adm_tab_wallets">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="2" y="6" width="16" height="10" rx="1"/>
                                <rect x="6" y="9" width="8" height="4" rx="1"/>
                            </svg>
                            Кошельки
                        </button>
                    </li>
                    <li>
                        <button class="admin-nav-btn" data-tab="add-news" data-translate="adm_tab_news">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="3" y="4" width="14" height="12" rx="1"/>
                                <line x1="6" y1="8" x2="14" y2="8"/>
                                <line x1="6" y1="11" x2="12" y2="11"/>
                                <line x1="6" y1="14" x2="10" y2="14"/>
                            </svg>
                            Добавить новость
                        </button>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- ОСНОВНОЙ КОНТЕНТ -->
        <main class="admin-main" role="main">
            <!-- СЕКЦИЯ МОДЕРАЦИИ И СТАТИСТИКИ -->
            <section id="tab-moderation" class="admin-tab active">
                <div class="admin-stats-grid">
                    <div class="stat-card">
                        <span class="stat-card-label" data-translate="stat_total_profiles">Всего анкет</span>
                        <span class="stat-card-number" id="stat-profiles-count">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-label" data-translate="stat_pending_profiles">На модерации</span>
                        <span class="stat-card-number" id="stat-pending-count">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-card-label" data-translate="stat_total_news">Всего новостей</span>
                        <span class="stat-card-number" id="stat-news-count">0</span>
                    </div>
                </div>
                <div class="admin-tab-header">
                    <h2 class="admin-tab-title" data-translate="adm_mod_title">Анкеты на модерацию</h2>
                </div>
                <div class="admin-profiles-grid" id="admin-moderation-list">
                    <div id="admin-mod-empty" class="admin-empty" data-translate="adm_mod_empty">Нет анкет на модерацию</div>
                </div>
            </section>

            <!-- СЕКЦИЯ ГОРОДОВ -->
            <section id="tab-cities" class="admin-tab" style="display: none;">
                <div class="admin-tab-header">
                    <h2 class="admin-tab-title" data-translate="adm_cities_title">Управление городами</h2>
                </div>
                <form id="admin-city-form" class="admin-form-inline" novalidate>
                    <div class="admin-form-group" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="city-name" name="city_name" class="admin-form-input" style="flex: 1; min-width: 200px;" placeholder="Название города" data-translate-placeholder="adm_city_placeholder">
                        <button type="submit" class="btn btn-primary" data-translate="adm_city_add">Добавить город</button>
                    </div>
                </form>
                <ul id="cities-list" class="admin-simple-list">
                    <li class="admin-empty" id="cities-empty" data-translate="adm_cities_empty">Города не добавлены</li>
                </ul>
            </section>

            <!-- СЕКЦИЯ ТАРИФОВ -->
            <section id="tab-tariffs" class="admin-tab" style="display: none;">
                <div class="admin-tab-header">
                    <h2 class="admin-tab-title" data-translate="adm_tariffs_title">Управление тарифами</h2>
                </div>
                <form id="admin-tariff-form" class="admin-form-inline" novalidate>
                    <div class="admin-form-group" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                        <input type="text" id="tariff-name" name="tariff_name" class="admin-form-input" style="flex: 1; min-width: 150px;" placeholder="Название тарифа" data-translate-placeholder="adm_tariff_name_placeholder">
                        <input type="number" id="tariff-price" name="tariff_price" class="admin-form-input" style="width: 120px;" placeholder="Цена" data-translate-placeholder="adm_tariff_price_placeholder">
                        <button type="submit" class="btn btn-primary" data-translate="adm_tariff_add">Добавить тариф</button>
                    </div>
                </form>
                <ul id="tariffs-list" class="admin-simple-list">
                    <li class="admin-empty" id="tariffs-empty" data-translate="adm_tariffs_empty">Тарифы не добавлены</li>
                </ul>
            </section>

            <!-- СЕКЦИЯ КОШЕЛЬКОВ -->
            <section id="tab-wallets" class="admin-tab" style="display: none;">
                <div class="admin-tab-header">
                    <h2 class="admin-tab-title" data-translate="adm_wallets_title">Настройка платежных реквизитов</h2>
                </div>
                <form id="admin-wallets-form" novalidate>
                    <div class="admin-form-group">
                        <label for="wallet-btc" class="admin-form-label" data-translate="adm_wallet_btc">Bitcoin</label>
                        <input type="text" id="wallet-btc" name="wallet_btc" class="admin-form-input" data-translate-placeholder="adm_wallet_btc_placeholder">
                    </div>
                    <div class="admin-form-group">
                        <label for="wallet-eth" class="admin-form-label" data-translate="adm_wallet_eth">Ethereum</label>
                        <input type="text" id="wallet-eth" name="wallet_eth" class="admin-form-input" data-translate-placeholder="adm_wallet_eth_placeholder">
                    </div>
                    <div class="admin-form-group">
                        <label for="wallet-usdt" class="admin-form-label" data-translate="adm_wallet_usdt">USDT (TRC-20)</label>
                        <input type="text" id="wallet-usdt" name="wallet_usdt" class="admin-form-input" data-translate-placeholder="adm_wallet_usdt_placeholder">
                    </div>
                    <button type="submit" class="btn btn-primary admin-form-submit" data-translate="adm_save_wallets">Сохранить кошельки</button>
                </form>
            </section>

            <!-- СЕКЦИЯ НОВОСТЕЙ -->
            <section id="tab-add-news" class="admin-tab" style="display: none;">
                <div class="admin-tab-header">
                    <h2 class="admin-tab-title" data-translate="adm_news_title">Публикация новости</h2>
                </div>
                <form id="admin-news-form" novalidate>
                    <div class="admin-form-group">
                        <label for="news-title" class="admin-form-label" data-translate="adm_news_title_label">Заголовок</label>
                        <input type="text" id="news-title" name="news_title" class="admin-form-input" required data-translate-placeholder="adm_news_title_placeholder">
                    </div>
                    <div class="admin-form-group">
                        <label for="news-content" class="admin-form-label" data-translate="adm_news_content_label">Текст новости</label>
                        <textarea id="news-content" name="news_content" class="admin-form-textarea" rows="6" required data-translate-placeholder="adm_news_content_placeholder"></textarea>
                    </div>
                    <div class="admin-form-group">
                        <label for="news-image" class="admin-form-label" data-translate="adm_news_image_label">Ссылка на картинку</label>
                        <input type="text" id="news-image" name="news_image" class="admin-form-input" data-translate-placeholder="adm_news_image_placeholder">
                    </div>
                    <button type="submit" class="btn btn-primary admin-form-submit" data-translate="adm_publish_news">Опубликовать новость</button>
                </form>
            </section>
        </main>
    </div>

    <script src="/frontend/app.js"></script>
</body>
</html>
